<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Aria Mostajeran{% endblock %}</title>

  <!-- Design -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Charts (only loaded on pages that need it) -->
  {% block head %}{% endblock %}
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">AM</a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#experience">Experience</a></li>
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/#skills">Skills</a></li>
      <li><a href="mailto:ariamostajeran99@gmail.com">Contact</a></li>
    </ul>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>
      Built with Flask &amp; Docker &mdash; deployed on Render &mdash;
      <a href="https://github.com/ariamostajeran" target="_blank" rel="noopener">@ariamostajeran</a>
    </p>
  </footer>

  {% block scripts %}{% endblock %}

  <!-- ── CHAT WIDGET ─────────────────────────────────────────── -->
  <button id="assistant-toggle" title="Ask about Aria">
    <i class="fas fa-robot"></i>
  </button>

  <div id="assistant-panel">
    <div class="ap-header">
      <i class="fas fa-robot" style="color:var(--accent); font-size:1rem;"></i>
      <p class="ap-header-title">Ask about <span>Aria</span></p>
      <button class="ap-icon-btn" id="ap-new" title="New conversation"><i class="fas fa-rotate-right"></i></button>
      <button class="ap-icon-btn" id="ap-close" title="Close"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="ap-messages" id="ap-messages"></div>
    <div class="ap-input-row">
      <input id="ap-input" type="text" placeholder="Ask anything about Aria…" autocomplete="off" />
      <button id="ap-send"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/assistant.js') }}"></script>

</body>
</html>
